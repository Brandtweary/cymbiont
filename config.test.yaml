# Cymbiont Test Configuration

# Backend server configuration
backend:
  # Host setting (ignored for security - server always binds to localhost)
  host: 127.0.0.1
  # Port for the backend server
  port: 8888
  # Maximum number of alternative ports to try if the default is unavailable
  max_port_attempts: 10

# Development-only settings
development:
  # 3 second duration for tests
  default_duration: 3

# Data storage directory - use test_data to keep test data separate
data_dir: test_data