# Cymbiont Knowledge Graph Configuration

# Data storage directory configuration
# Directory where Cymbiont stores knowledge graph data, transaction logs, etc.
# Can be absolute or relative path (default: "data")
data_dir: data

# Backend server configuration
backend:
  # Port for the backend server
  port: 8888
  # Maximum number of alternative ports to try if the default is unavailable
  # Will try ports from port to port+max_port_attempts
  max_port_attempts: 10
  # Server discovery file (enables multi-instance deployments)
  server_info_file: "cymbiont_server.json"

# Development-only settings
development:
  # Default duration in seconds for development runs (when --duration is not specified)
  # Set to null to disable auto-duration behavior
  default_duration: 3

# Authentication configuration
auth:
  # Use a fixed token instead of auto-generated (not recommended for production)
  # token: "your-secret-token"
  token: null
  # Disable auth entirely (only for trusted environments)
  disabled: false

# Transaction log configuration
transaction_log:
  # Durability settings
  fsync_interval_ms: 100  # How often to force writes to disk (milliseconds)
  
  # Compaction settings  
  compaction_threshold_mb: 100  # Compact when log exceeds this size
  retention_days: 7  # Keep completed transactions for at least this many days
  
  # Data integrity settings
  redundant_copies: 10  # Number of redundant log copies for consensus
  integrity_check_on_startup: true  # Run integrity checks and auto-repair at startup


# Tracing and logging configuration
tracing:
  # Output destination for logs: "stdout" or "stderr"
  # IMPORTANT: Must be "stderr" when running as MCP server (--mcp flag)
  # MCP protocol requires stdout to be reserved exclusively for JSON-RPC messages
  output: "stderr"

# Verbosity monitoring (warns when log volume exceeds thresholds)
verbosity:
  info_threshold: 50  # Maximum INFO logs before warning
  debug_threshold: 100  # Maximum DEBUG logs before warning
  trace_threshold: 200  # Maximum TRACE logs before warning

# Rotating file logger configuration (used for MCP server logging)
rotating_file_logger:
  log_directory: "logs"         # Directory to store log files
  filename: "mcp_server.log"    # Base filename for logs
  max_files: 10                 # Number of rotating files to keep
  max_size_mb: 5               # Size limit in MB before rotation
  console_output: true         # Also output to console
  truncate_on_limit: true      # Stop at limit vs create numbered backups
