# Test configuration for Cymbiont
# This config is used by integration tests

# Backend server configuration
backend:
  host: 127.0.0.1
  port: 3000
  max_port_attempts: 10

# Logseq application configuration
logseq:
  auto_launch: true
  # Session management configuration
  launch_specific_database: false
  # Pre-configured test databases
  databases:
    - path: logseq_databases/dummy_graph
      name: dummy_graph
    - path: logseq_databases/dummy_graph_2
      name: dummy_graph_2

# Development settings for tests
development:
  # Default to 3 seconds for tests
  default_duration: 3

# Sync configuration
sync:
  incremental_interval_hours: 2
  full_interval_hours: 168
  enable_full_sync: false